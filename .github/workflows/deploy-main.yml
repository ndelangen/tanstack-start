name: Deploy production

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  verify:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/reusable-verify.yml

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: verify
    environment: production
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Deploy Convex
        run: bun run convex:deploy
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          CONVEX_DEPLOYMENT: ${{ secrets.CONVEX_DEPLOYMENT }}

      - name: Run and verify required migrations
        run: bun run migrations:deploy
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          CONVEX_DEPLOYMENT: ${{ secrets.CONVEX_DEPLOYMENT }}

      - name: Preflight exact scheduled Worker release
        run: bun run ./scripts/publisher-deployment-contract.ts preflight
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL }}

      - name: Check generated Worker types
        run: bun run publisher:types:check

      - name: Typecheck Worker release
        run: bun run publisher:typecheck

      - name: Build unified Worker release
        run: bun run publisher:assets
        env:
          VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL }}

      - name: Verify assembled Worker assets
        run: bun run publisher:assets:check

      - name: Verify release build kept merged source exact
        run: >-
          git diff --exit-code &&
          git diff --cached --exit-code &&
          test -z "$(git ls-files --others --exclude-standard)"

      - name: Dry-run exact Worker release
        run: bun run publisher:release:dry-run

      - name: Deploy exact Worker release
        run: >-
          bunx wrangler deploy
          --strict
          --config workers/publisher/wrangler.jsonc
          --tag "$GITHUB_SHA"
          --message "GitHub Actions production $GITHUB_SHA"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

      - name: Smoke scheduled Worker release
        run: bun run ./scripts/publisher-deployment-contract.ts smoke

      # --no-build: skip netlify.toml build.command; without it the CLI runs @netlify/build first
      # and can publish as a draft even when --prod is set (prebuilt dist/client only).
      - name: Deploy rollback build to Netlify
        run: npx --yes netlify-cli@latest deploy --dir "./dist/client" --no-build --prod --message "GitHub Actions production deploy"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
